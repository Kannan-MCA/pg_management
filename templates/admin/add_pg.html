<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add PG - GPS Location</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        #map { height: 400px; border-radius: 15px; border: 3px solid #e9ecef; }
        .gps-btn { background: #28a745; border: none; }
        .gps-btn:hover { background: #218838; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card p-5">
                    <div class="text-center mb-5">
                        <i class="fas fa-building fa-4x text-primary mb-3"></i>
                        <h2 class="display-5 fw-bold">Add New PG</h2>
                        <p class="text-muted lead">Pin exact location using GPS</p>
                    </div>

                    <form method="POST" id="pgForm">
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">PG Name <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Total Rooms <span class="text-danger">*</span></label>
                                <input type="number" name="total_rooms" class="form-control form-control-lg" min="1" required>
                            </div>
                        </div>

                        <!-- 🔥 GPS LOCATION PICKER -->
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-primary text-white">
                                <h5><i class="fas fa-map-marker-alt me-2"></i>📍 GPS Location Picker</h5>
                            </div>
                            <div class="card-body p-0">
                                <div id="map" class="w-100"></div>
                                <div class="p-3 bg-light">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small mb-1">Location Name</label>
                                            <input type="text" name="location" id="locationName" class="form-control" placeholder="eg: Anna Nagar, Chennai">
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label fw-bold small mb-1">Latitude</label>
                                            <input type="text" name="latitude" id="latitude" class="form-control" readonly>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="form-label fw-bold small mb-1">Longitude</label>
                                            <input type="text" name="longitude" id="longitude" class="form-control" readonly>
                                        </div>
                                    </div>
                                    <div class="mt-2">
                                        <button type="button" class="btn gps-btn btn-success btn-sm me-2" onclick="getCurrentLocation()">
                                            <i class="fas fa-location-arrow me-1"></i>Get My GPS
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="clearLocation()">
                                            <i class="fas fa-times me-1"></i>Clear
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                <i class="fas fa-plus me-2"></i>Add PG
                            </button>
                            <a href="{{ url_for('admin_pgs') }}" class="btn btn-outline-secondary btn-lg px-5 ms-2">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Maps API - REPLACE YOUR_API_KEY -->
    <script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap&libraries=geometry"></script>
    
    <script>
        let map, marker, infoWindow;
        
        function initMap() {
            // Default Chennai location
            const defaultPos = { lat: 13.0827, lng: 80.2707 };
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: defaultPos,
                mapTypeId: 'roadmap'
            });
            
            // Click to set location
            map.addListener('click', function(event) {
                updateLocation(event.latLng.lat(), event.latLng.lng());
            });
            
            infoWindow = new google.maps.InfoWindow();
        }
        
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const pos = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        map.setCenter(pos);
                        map.setZoom(17);
                        updateLocation(pos.lat, pos.lng);
                    },
                    function() {
                        alert('GPS access denied. Click map to set location.');
                    }
                );
            } else {
                alert('GPS not supported. Click map to set location.');
            }
        }
        
        function updateLocation(lat, lng) {
            // Remove old marker
            if (marker) marker.setMap(null);
            
            // Add new marker
            marker = new google.maps.Marker({
                position: { lat: lat, lng: lng },
                map: map,
                title: 'PG Location'
            });
            
            // Update form fields
            document.getElementById('latitude').value = lat.toFixed(6);
            document.getElementById('longitude').value = lng.toFixed(6);
            
            // Reverse geocoding
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: { lat: lat, lng: lng } }, function(results, status) {
                if (status === 'OK' && results[0]) {
                    document.getElementById('locationName').value = results[0].formatted_address.split(',')[0];
                }
            });
        }
        
        function clearLocation() {
            if (marker) marker.setMap(null);
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
            document.getElementById('locationName').value = '';
        }
    </script>
</body>
</html>
