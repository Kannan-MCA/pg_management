<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PG Management{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, #1bc958, transparent),
        radial-gradient(2px 2px at 40px 70px, white, transparent),
        radial-gradient(1px 1px at 90px 40px, #4d06c7, transparent),
        radial-gradient(1px 1px at 130px 80px, #a41616, transparent);
    background-repeat: repeat;
    background-size: 200px 100px;
    animation: stars 20s linear infinite;
    box-shadow: #1bc958 0px 0px 10px, white 0px 0px 5px, #4d06c7 0px 0px 15px, #a41616 0px 0px 20px ;
}
@keyframes stars {
    from { transform: translateY(0px); }
    to { transform: translateY(-100px); }
}
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
        }
        .btn-glow {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(78,205,196,0.4);
            transition: all 0.3s;
        }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(78,205,196,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
