<!DOCTYPE html>
<html>
<head><title>Booking Confirmed!</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div class="container py-5 text-center">
    <div class="glass-card p-5">
        <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
        <h1>Booking Confirmed!</h1>
        <h3>Booking ID: <span class="badge bg-success fs-3">BK{{ booking.id|format(4) }}</span></h3>
        
        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <div class="glass-card p-4 mb-4">
                    <h5><i class="fas fa-building me-2"></i>{{ pg.name }}</h5>
                    <h5><i class="fas fa-bed me-2"></i>Room {{ room.number }}</h5>
                    <h5><i class="fas fa-user me-2"></i>{{ booking.tenant_name }}</h5>
                    <h5><i class="fas fa-phone me-2"></i>{{ booking.tenant_phone }}</h5>
                </div>
                <a href="{{ url_for('pgs') }}" class="btn btn-success btn-lg">View All PGs</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
