<!DOCTYPE html>
<html lang="en">
<head>
    <title>KYC - {{ room.number }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Your glassmorphism styles here -->
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="glass-card p-5">
                    <h2>KYC Verification</h2>
                    <p>Complete your details for Room {{ room.number }} at {{ pg.name }}</p>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Full Name *</label>
                            <input type="text" name="tenant_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone *</label>
                            <input type="tel" name="tenant_phone" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="tenant_email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Aadhar Number</label>
                            <input type="text" name="tenant_aadhar" class="form-control" maxlength="12">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Move-in Date</label>
                            <input type="date" name="move_in_date" class="form-control">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Verify & Proceed to Payment</button>
                            <a href="{{ url_for('rooms', pg_id=pg.id) }}" class="btn btn-outline-light">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
