<!DOCTYPE html>
<html>
<head><title>Payment - {{ room.number }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card p-5 text-center">
                <h2>Payment Details</h2>
                <h4>Room {{ room.number }} - {{ booking.tenant_name }}</h4>
                <h3>₹{{ "%.0f"|format(total_amount) }}</h3>
                
                <form method="POST">
                    <div class="mb-4">
                        <label>Payment Method:</label><br>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="payment_method" value="razorpay" checked>
                            <label class="form-check-label">Razorpay/Card/UPI</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100">Pay Now ₹{{ "%.0f"|format(total_amount) }}</button>
                </form>
                
                <div class="mt-4">
                    <small class="text-white-50">Payment secured with SSL encryption</small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
