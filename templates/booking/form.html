<!DOCTYPE html>
<html lang="en">
<head>
    <title>Book Room {{ room.number }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Same glassmorphism styles as before -->
</head>
<body>
    <!-- Same navbar as before -->
    
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card p-5">
                    <!-- Room details same as before -->
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold fs-5 mb-2">Full Name <span class="text-danger">*</span></label>
                                <input type="text" name="tenant_name" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold fs-5 mb-2">Phone <span class="text-danger">*</span></label>
                                <input type="tel" name="tenant_phone" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold fs-5 mb-2">Email</label>
                                <input type="email" name="tenant_email" class="form-control form-control-lg">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold fs-5 mb-2">Aadhar No.</label>
                                <input type="text" name="tenant_aadhar" class="form-control form-control-lg" maxlength="12">
                            </div>
                        </div>

                        <!-- ✅ NEW: ID Proof Upload -->
                        <div class="mb-4">
                            <label class="form-label fw-bold fs-5 mb-2">ID Proof <span class="text-info">(Recommended)</span></label>
                            <input type="file" name="id_proof" class="form-control form-control-lg" accept="image/*,.pdf">
                            <div class="form-text text-white-50">Aadhar/Voter ID/Passport (JPG/PNG/PDF)</div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-glow btn-success btn-lg px-5">
                                <i class="fas fa-check-circle me-2"></i>Confirm & Pay ₹{{ "%.0f"|format(room.price) }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
