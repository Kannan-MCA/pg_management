{% extends "base.html" %}
{% block title %}Manage PGs - Admin{% endblock %}
{% block content %}
<div class="glass-card p-5 mb-4">
    <h2>🏠 Manage PG PROPERTIES</h2>
    
    <!-- Add PG Form -->
    <form method="POST" class="row g-3 mb-4 p-4 border rounded bg-white bg-opacity-10">
        <div class="col-md-4">
            <label class="form-label">PG Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Total Rooms</label>
            <input type="number" name="total_rooms" class="form-control" value="10">
        </div>
        <div class="col-md-12">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="2"></textarea>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-success">+ Add PG</button>
        </div>
    </form>

    <!-- PG List -->
    <div class="row">
        {% for pg in pgs %}
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="glass-card p-4 h-100">
                <div class="d-flex justify-content-between">
                    <h5>{{ pg.name }}</h5>
                    <form method="POST" action="{{ url_for('admin.delete_pg', pg_id=pg.id) }}" 
                          onsubmit="return confirm('Delete {{ pg.name }}?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </div>
                <p class="text-white-50">{{ pg.location }}</p>
                <a href="{{ url_for('admin.manage_rooms', pg_id=pg.id) }}" class="btn btn-outline-light btn-sm">
                    Manage Rooms
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
